<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Spinners — All 55</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding: 40px 24px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      color: #00ff88;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header p {
      margin-top: 8px;
      color: #555;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 24px 12px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: #00ff8844;
      background: #1a1a1a;
    }

    .spinner-frame {
      font-size: 28px;
      line-height: 1;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00ff88;
      white-space: pre;
    }

    .spinner-label {
      font-size: 0.65rem;
      color: #555;
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .tag {
      font-size: 0.6rem;
      color: #333;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 1px 5px;
      letter-spacing: 0.04em;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <h1>Agent Spinners</h1>
  <p>55 terminal-style animated spinners &mdash; zero dependencies</p>
</header>

<div class="grid" id="grid"></div>

<footer>expo-agent-spinners &mdash; react native &amp; web</footer>

<script>

  { name: "Dots 13",             frames: ["⣼","⣹","⢻","⠿","⡟","⣏","⣧","⣶"],                                                                                                                                                                                                                                                    interval: 80  },
  { name: "Dots 14",             frames: ["⠉⠉","⠈⠙","⠀⠹","⠀⢸","⠀⣰","⢀⣠","⣀⣀","⣄⡀","⣆⠀","⡇⠀","⠏⠀","⠋⠁"],                                                                                                                                                                                                                      interval: 80  },
  { name: "Sand",                frames: ["⠁","⠂","⠄","⡀","⡈","⡐","⡠","⣀","⣁","⣂","⣄","⣌","⣔","⣤","⣥","⣦","⣮","⣶","⣷","⣿","⡿","⠿","⢟","⠟","⡛","⠛","⠫","⢋","⠋","⠍","⡉","⠉","⠑","⠡","⢁"],                                                                                                                                      interval: 80  },

  { name: "Rain",                frames: ["⢁⠂⠔⠈","⠂⠌⡠⠐","⠄⡐⢀⠡","⡈⠠⠀⢂","⠐⢀⠁⠄","⠠⠁⠊⡀","⢁⠂⠔⠈","⠂⠌⡠⠐","⠄⡐⢀⠡","⡈⠠⠀⢂","⠐⢀⠁⠄","⠠⠁⠊⡀"],                                                                                                                                                                                            interval: 100 },
  { name: "Pulse",               frames: ["⠀⠶⠀","⠰⣿⠆","⢾⣉⡷","⣏⠀⣹","⡁⠀⢈"],                                                                                                                                                                                                                                                    interval: 180 },
  { name: "Snake",               frames: ["⣁⡀","⣉⠀","⡉⠁","⠉⠉","⠈⠙","⠀⠛","⠐⠚","⠒⠒","⠖⠂","⠶⠀","⠦⠄","⠤⠤","⠠⢤","⠀⣤","⢀⣠","⣀⣀"],                                                                                                                                                                                                interval: 80  },
  { name: "Sparkle",             frames: ["⡡⠊⢔⠡","⠊⡰⡡⡘","⢔⢅⠈⢢","⡁⢂⠆⡍","⢔⠨⢑⢐","⠨⡑⡠⠊"],                                                                                                                                                                                                                                        interval: 150 },

  { name: "Orbit",               frames: ["⠃","⠉","⠘","⠰","⢠","⣀","⡄","⠆"],                                                                                                                                                                                                                                                    interval: 100 },
  { name: "Breathe",             frames: ["⠀","⠂","⠌","⡑","⢕","⢝","⣫","⣟","⣿","⣟","⣫","⢝","⢕","⡑","⠌","⠂","⠀"],                                                                                                                                                                                                                interval: 100 },
  { name: "Wave Rows",           frames: ["⠖⠉⠉⠑","⡠⠖⠉⠉","⣠⡠⠖⠉","⣄⣠⡠⠖","⠢⣄⣠⡠","⠙⠢⣄⣠","⠉⠙⠢⣄","⠊⠉⠙⠢","⠜⠊⠉⠙","⡤⠜⠊⠉","⣀⡤⠜⠊","⢤⣀⡤⠜","⠣⢤⣀⡤","⠑⠣⢤⣀","⠉⠑⠣⢤","⠋⠉⠑⠣"],                                                                                                                                                            interval: 90  },
  { name: "Checkerboard",        frames: ["⢕⢕⢕","⡪⡪⡪","⢊⠔⡡","⡡⢊⠔"],                                                                                                                                                                                                                                                            interval: 250 },

  { name: "DQPB",                frames: ["d","q","p","b"],                                                                                                                                                                                                                                                                      interval: 100 },

  { name: "Arc",                 frames: ["◜","◠","◝","◞","◡","◟"],                                                                                                                                                                                                                                                              interval: 100 },
  { name: "Balloon",             frames: [".","o","O","o","."],                                                                                                                                                                                                                                                                  interval: 120 },
  { name: "Circle Halves",       frames: ["◐","◓","◑","◒"],                                                                                                                                                                                                                                                                      interval: 50  },

];

const grid = document.getElementById("grid");

SPINNERS.forEach((spinner, i) => {
  const card = document.createElement("div");
  card.className = "card";

  const frame = document.createElement("div");
  frame.className = "spinner-frame";
  frame.textContent = spinner.frames[0];

  const label = document.createElement("div");
  label.className = "spinner-label";
  label.textContent = spinner.name;

  const tag = document.createElement("div");
  tag.className = "tag";
  tag.textContent = spinner.interval + "ms";

  card.appendChild(frame);
  card.appendChild(label);
  card.appendChild(tag);
  grid.appendChild(card);

  let idx = 0;
  setInterval(() => {
    idx = (idx + 1) % spinner.frames.length;
    frame.textContent = spinner.frames[idx];
  }, spinner.interval);
});

</html>
