  { name: "Pendulum",            frames: ["в–Ңв Җв Җ","в Җв–Ңв Җ","в Җв Җв–Ң","в Җв–Ңв Җ"],                                                                                                                                                                                                                                        interval: 120 },
  { name: "Aurora",              frames: ["вЈҝвЎ¶в ¶в ¶","в ¶вЈҝвЎ¶в ¶","в ¶в ¶вЈҝвЎ¶","в ¶в ¶в ¶вЈҝ","в ¶в ¶вЈҝвЎ¶","в ¶вЈҝвЎ¶в ¶"],                                                                                                                                                                                                                                    interval: 80  },
  { name: "Crystallize",         frames: ["в Җв Ғв Җ","в Ғв Ӣв Ғ","в Ӣв ӣв Ӣ","в ӣвЈӣв ӣ","вЈӣвЈҝвЈӣ","вЈҝвЈҝвЈҝ","вЈӣвЈҝвЈӣ","в ӣвЈӣв ӣ","в Ӣв ӣв Ӣ","в Ғв Ӣв Ғ","в Җв Ғв Җ"],                                                                                                                                                                                                            interval: 80  },
  { name: "Silk",                frames: ["в–Ғв–Ӯв–ғв–Ӯв–Ғ","в–Ӯв–ғв–Ӯв–Ғв–Ӯ","в–ғв–Ӯв–Ғв–Ӯв–ғ","в–Ӯв–Ғв–Ӯв–ғв–Ӯ"],                                                                                                                                                                                                                                                interval: 100 },
  { name: "Laser",               frames: ["в–җв Җв Җв Җ","в Җв–җв Җв Җ","в Җв Җв–җв Җ","в Җв Җв Җв–җ","в Җв Җв–җв Җ","в Җв–җв Җв Җ"],                                                                                                                                                                                                                                    interval: 70  },
  { name: "Nebula",              frames: ["в ҖвЈҖв Җ","вЈҖвЈ¶вЈҖ","вЈ¶вЈҝвЈ¶","вЈҝвЈҝвЈҝ","вЈ¶вЈҝвЈ¶","вЈҖвЈ¶вЈҖ","в ҖвЈҖв Җ","в Җв Җв Җ"],                                                                                                                                                                                                                              interval: 120 },
  { name: "Mercury",             frames: ["вЈӨв Җв Җ","вЈҝвЈӨв Җ","вЈҝвЈҝвЈӨ","вЈҝвЈҝвЈҝ","вЈҝвЈҝвЈӨ","вЈҝвЈӨв Җ","вЈӨв Җв Җ","в Җв Җв Җ"],                                                                                                                                                                                                                              interval: 100 },
  { name: "Vortex",              frames: ["в—Ңв—Һв—Ң","в—Һв—үв—Һ","в—үв—Ҹв—ү","в—Һв—үв—Һ","в—Ңв—Һв—Ң"],                                                                                                                                                                                                                                                  interval: 120 },
  { name: "Plasma",              frames: ["в ҝвЈ»в ҝ","вЈ»вЈҝвЈ»","в ҝвЈ»в ҝ","вўҝвЈҜвўҝ","вЈҜвЈҝвЈҜ","вўҝвЈҜвўҝ"],                                                                                                                                                                                                                                          interval: 80  },
  { name: "Firefly",             frames: ["в Ғв Җв Җв Җ","в Җв Җв Ӯв Җ","в Җв Җв Җв Ғ","в Җв „в Җв Җ","в Җв Җв Ҳв Җ","в Ӯв Җв Җв Җ","в Җв Җв Җв „","в Җв Ғв Җв Җ"],                                                                                                                                                                                                                      interval: 180 },
  { name: "Ripple",              frames: ["В·  ","вҲҳВ· ","в—ӢвҲҳВ·","в—Ҝв—ӢвҲҳ"," в—Ҝв—Ӣ","  в—Ҝ","   "],                                                                                                                                                                                                                                      interval: 120 },
];

const grid = document.getElementById("grid");

SPINNERS.forEach((spinner, i) => {
  const card = document.createElement("div");
  card.className = "card";

  const frame = document.createElement("div");
  frame.className = "spinner-frame";
  frame.textContent = spinner.frames[0];

  const label = document.createElement("div");
  label.className = "spinner-label";
  label.textContent = spinner.name;

  const tag = document.createElement("div");
  tag.className = "tag";
  tag.textContent = spinner.interval + "ms";

  card.appendChild(frame);
  card.appendChild(label);
  card.appendChild(tag);
  grid.appendChild(card);

  let idx = 0;
  setInterval(() => {
    idx = (idx + 1) % spinner.frames.length;
    frame.textContent = spinner.frames[idx];
  }, spinner.interval);
});
</script>
